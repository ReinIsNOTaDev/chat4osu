<div class="parent-container">
  <virtual-scroll *ngIf="messages && messages.length > 0; else empty" [items]="messages" [enableUnequalChildrenSizes]="true" (vsUpdate)="viewPortItems = $event">
    <div class="message" [ngClass]="{ action: msg.action }" *ngFor="let msg of viewPortItems">
      <span class="date">[{{ parseDate(msg.date) }}]</span>
      <span class="sender normal" *ngIf="!msg.action" (click)="clickUser(msg.sender)">
        {{ msg.sender }}:
      </span>
      <span class="sender action" *ngIf="msg.action">{{ msg.sender }}</span>
      <span [innerHTML]="msg.message | parse"></span>
    </div>
  </virtual-scroll>

  <ng-template #empty>
    <div class="empty">There are no messages to display</div>
  </ng-template>
</div>
