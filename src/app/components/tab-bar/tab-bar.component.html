<div class="tab-container">
  <div class="tab" *ngFor="let channel of channels" (click)="onSetChannel(channel)" [ngClass]="{'active': channel === currentChannel}">
    <span>{{channel}}</span>
    <span class="leave" (click)="onLeaveChannel($event, channel)">x</span>
  </div>
  <div class="tab join" (click)="onJoinChannelClick()">+</div>
</div>
