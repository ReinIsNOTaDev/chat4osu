<div #tabContainer class="tab-container" (wheel)="onWheel($event)">
  <div class="tab" *ngFor="let channel of channels" (click)="onSetChannel(channel)" (auxclick)="onMiddleClickChannel($event, channel)"
    [ngClass]="{'active': channel === currentChannel, 'unread': isUnread(channel)}">
    <span>{{channel}}</span>
    <span class="leave" (click)="onLeaveChannel($event, channel)">x</span>
  </div>
  <div class="tab join" (click)="onJoinChannelClick()">+</div>
</div>
